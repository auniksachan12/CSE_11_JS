<!DOCTYPE html>
<html lang="en">
<head>
    <title>Experiment 2</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Employee  System</h1>

<div class="container">

    <input type="text" id="name" placeholder="Employee Name">
    <input type="text" id="id" placeholder="Employee ID">
    <input type="number" id="salary" placeholder="Salary">
    <input type="text" id="dept" placeholder="Department">

    <button onclick="addEmployee()">Add Employee</button>
    <div class="buttons">
        <button onclick="displayEmployees()">Display All Employee</button>
        <button onclick="filterSalary()">Salary > 50000</button>
        <button onclick="totalSalary()">Total Salary of employee</button>
        <button onclick="minMaxSalary()">Min & Max Salary</button>
        
    </div>

    <div class="dept-section">
        <input type="text" id="deptSearch" placeholder="Enter Department of employee">
        
    </div>

</div>

<h2>Output</h2>
<div id="output"></div>

<script src="script.js"></script>

</body>
</html>
